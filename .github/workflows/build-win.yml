name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Build EXE
        run: poetry run pyinstaller --onefile --console --name parse_drone_losses parse_drone_losses.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: parse_drone_losses-windows
          path: dist/parse_drone_losses.exe